name: Flutter Side Nightly AI Duels

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  ai-duel-stress:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: AI-vs-AI stress duel
        run: flutter pub run tool/sheshbesh_ai_duel.dart --games=500 --seed=20260226 --run-id=ci-sheshbesh-nightly

      - name: Upload AI duel artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sheshbesh-ai-duel-nightly
          path: artifacts/bughunt/ci-sheshbesh-nightly
          if-no-files-found: warn
