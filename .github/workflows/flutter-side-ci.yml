name: Flutter Side CI

on:
  push:
    branches:
      - main
      - fixes/**
    paths:
      - "lib/**"
      - "test/**"
      - "tool/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "analysis_options.yaml"
      - ".github/workflows/flutter-side-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "lib/**"
      - "test/**"
      - "tool/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "analysis_options.yaml"
      - ".github/workflows/flutter-side-ci.yml"
  workflow_dispatch:

jobs:
  flutter-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test tool

      - name: Static analysis
        run: flutter analyze

      - name: Unit and widget tests
        run: flutter test

      - name: AI-vs-AI smoke duel
        run: flutter pub run tool/sheshbesh_ai_duel.dart --games=150 --seed=20260226 --run-id=ci-sheshbesh-smoke

      - name: Upload AI duel artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sheshbesh-ai-duel-smoke
          path: artifacts/bughunt/ci-sheshbesh-smoke
          if-no-files-found: warn
