name: Flutter Side CI

on:
  push:
    branches:
      - main
      - fixes/**
    paths:
      - "lib/**"
      - "test/**"
      - "tool/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "analysis_options.yaml"
      - ".github/workflows/flutter-side-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "lib/**"
      - "test/**"
      - "tool/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "analysis_options.yaml"
      - ".github/workflows/flutter-side-ci.yml"
  workflow_dispatch:

jobs:
  flutter-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Verify shared dependency pin
        run: dart tool/verify_shared_dependency.dart

      - name: Clear checkout GitHub auth header
        shell: bash
        run: |
          git config --local --unset-all http.https://github.com/.extraheader || true
          git config --global --unset-all http.https://github.com/.extraheader || true

      - name: Validate access to shared git dependency
        shell: bash
        env:
          PUREFLUTTER_REPO_TOKEN: ${{ secrets.PUREFLUTTER_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if git ls-remote https://github.com/gammula/pureflutter.git HEAD >/dev/null 2>&1; then
            echo "Anonymous access to gammula/pureflutter is available."
            exit 0
          fi
          if [ -z "${PUREFLUTTER_REPO_TOKEN:-}" ]; then
            echo "::error::Anonymous git access failed and PUREFLUTTER_REPO_TOKEN is missing."
            echo "::error::Add PUREFLUTTER_REPO_TOKEN with read access to gammula/pureflutter."
            exit 1
          fi
          if ! git ls-remote "https://x-access-token:${PUREFLUTTER_REPO_TOKEN}@github.com/gammula/pureflutter.git" HEAD >/dev/null 2>&1; then
            echo "::error::PUREFLUTTER_REPO_TOKEN cannot read gammula/pureflutter."
            echo "::error::Use a token owned by an account that can open that repo, and ensure org SSO/token approval is completed if required."
            exit 1
          fi
          git config --global url."https://x-access-token:${PUREFLUTTER_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: flutter pub get
      - name: Cleanup tokenized Git auth
        if: always()
        shell: bash
        run: |
          keys="$(git config --global --name-only --get-regexp '^url\.https://x-access-token:.*@github\.com/\.insteadof$' || true)"
          if [ -n "$keys" ]; then
            while IFS= read -r key; do
              [ -n "$key" ] && git config --global --unset-all "$key" || true
            done <<< "$keys"
          fi
      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test tool

      - name: Static analysis
        run: flutter analyze lib test integration_test tool

      - name: Unit and widget tests
        run: flutter test

      - name: AI-vs-AI smoke duel
        shell: bash
        run: |
          set -euo pipefail
          RUN_ID="ci-sheshbesh-smoke-${{ github.run_id }}"
          LOG_FILE="artifacts/bughunt/$RUN_ID/backgammon/ai/locala.jsonl"
          mkdir -p debug

          set +e
          timeout --signal=TERM --kill-after=30s 12m flutter pub run tool/sheshbesh_ai_duel.dart \
            --games=150 \
            --seed=20260226 \
            --run-id="$RUN_ID"
          exit_code=$?
          set -e

          reason="success"
          if [ "$exit_code" -eq 124 ] || [ "$exit_code" -eq 137 ]; then
            reason="timeout"
          elif [ "$exit_code" -ne 0 ]; then
            reason="command_failed"
          fi

          sessions=0
          crashes=0
          invariants=0
          conversions=0
          if [ -f "$LOG_FILE" ]; then
            sessions=$(grep -c '"eventType":"session_complete"' "$LOG_FILE" || true)
            crashes=$(grep -c '"eventType":"crash"' "$LOG_FILE" || true)
            invariants=$(grep -c '"eventType":"invariant_failure"' "$LOG_FILE" || true)
            conversions=$(grep -c '"eventType":"conversion_failure"' "$LOG_FILE" || true)
            if [ "$crashes" -gt 0 ]; then
              reason="crash"
            fi
            if [ "$invariants" -gt 0 ]; then
              reason="invariant_failure"
            fi
            if [ "$conversions" -gt 0 ]; then
              reason="conversion_failures"
            fi
          fi

          if [ "$sessions" -lt 1 ] && [ "$reason" = "success" ]; then
            reason="missing_session_complete"
          fi

          cat >debug/ci-sheshbesh-duel-summary.json <<EOF
          {
            "run_id": "$RUN_ID",
            "reason": "$reason",
            "exit_code": $exit_code,
            "sessions": $sessions,
            "crashes": $crashes,
            "invariant_failures": $invariants,
            "conversion_failures": $conversions,
            "log_file": "$LOG_FILE"
          }
          EOF

          {
            echo "### sheshbesh-ai-duel-smoke"
            echo ""
            echo "- run_id: $RUN_ID"
            echo "- reason: $reason"
            echo "- exit_code: $exit_code"
            echo "- sessions: $sessions"
            echo "- crashes: $crashes"
            echo "- invariant_failures: $invariants"
            echo "- conversion_failures: $conversions"
          } >>"$GITHUB_STEP_SUMMARY"

          if [ "$reason" != "success" ]; then
            echo "::error::AI duel smoke failed: $reason"
            exit 1
          fi

      - name: Replay verification for AI duel artifacts
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          RUN_ID="ci-sheshbesh-smoke-${{ github.run_id }}"
          LOG_ROOT="artifacts/bughunt/$RUN_ID/backgammon/ai"
          LOG_FILE="$LOG_ROOT/locala.jsonl"
          SUMMARY_FILE="$LOG_ROOT/locala.summary.json"
          if [ ! -s "$LOG_FILE" ]; then
            echo "::error::No AI duel log produced at $LOG_FILE"
            exit 1
          fi
          flutter pub run tool/replay.dart \
            --trace="$LOG_FILE" \
            --run-id="$RUN_ID" \
            --seed=20260226 \
            --output="$SUMMARY_FILE"
          flutter pub run tool/verify_replay_artifacts.dart \
            --run-id="$RUN_ID" \
            --no-allow-empty

      - name: Upload AI duel artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sheshbesh-ai-duel-smoke
          path: |
            artifacts/bughunt/ci-sheshbesh-smoke-${{ github.run_id }}
            debug/ci-sheshbesh-duel-summary.json
          if-no-files-found: warn
