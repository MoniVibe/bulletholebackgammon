name: Mobile Installers

on:
  workflow_dispatch:

jobs:
  android-installers:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build universal APK
        run: flutter build apk --release

      - name: Build split APKs
        run: flutter build apk --release --split-per-abi

      - name: Build Android App Bundle
        run: flutter build appbundle --release

      - name: Create Android checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/installer-checksums
          sha256sum build/app/outputs/flutter-apk/*.apk > build/installer-checksums/android-sha256.txt
          sha256sum build/app/outputs/bundle/release/app-release.aab >> build/installer-checksums/android-sha256.txt

      - name: Upload Android installers
        uses: actions/upload-artifact@v4
        with:
          name: android-installers
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
            build/app/outputs/bundle/release/app-release.aab
            build/installer-checksums/android-sha256.txt
          if-no-files-found: error

  ios-unsigned-installer:
    runs-on: macos-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS app without code signing
        run: flutter build ios --release --no-codesign

      - name: Package unsigned iOS installer
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/installer-checksums
          cd build/ios/iphoneos
          ditto -c -k --sequesterRsrc --keepParent Runner.app Runner-no-codesign.zip
          shasum -a 256 Runner-no-codesign.zip > ../../installer-checksums/ios-unsigned-sha256.txt

      - name: Upload iOS unsigned installer
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-installer
          path: |
            build/ios/iphoneos/Runner-no-codesign.zip
            build/installer-checksums/ios-unsigned-sha256.txt
          if-no-files-found: error
