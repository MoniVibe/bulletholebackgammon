name: Bughunt Smoke

on:
  pull_request:
    branches: [main]
    paths:
      - "lib/**"
      - "tool/**"
      - "test/**"
      - "integration_test/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/workflows/bughunt-smoke.yml"
  workflow_dispatch:

jobs:
  backgammon-local-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        seed: [1201, 1202, 1203, 1204, 1205, 1206, 1207, 1208, 1209, 1210]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: false
      - name: Verify shared dependency pin
        run: dart tool/verify_shared_dependency.dart

      - name: Clear checkout GitHub auth header
        shell: bash
        run: |
          git config --local --unset-all http.https://github.com/.extraheader || true
          git config --global --unset-all http.https://github.com/.extraheader || true

      - name: Validate access to shared git dependency
        shell: bash
        env:
          PUREFLUTTER_REPO_TOKEN: ${{ secrets.PUREFLUTTER_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if git ls-remote https://github.com/meshik/pureflutter.git HEAD >/dev/null 2>&1; then
            echo "Anonymous access to meshik/pureflutter is available."
            exit 0
          fi
          if [ -z "${PUREFLUTTER_REPO_TOKEN:-}" ]; then
            echo "::error::Anonymous git access failed and PUREFLUTTER_REPO_TOKEN is missing."
            echo "::error::Add PUREFLUTTER_REPO_TOKEN with read access to meshik/pureflutter."
            exit 1
          fi
          if ! git ls-remote "https://x-access-token:${PUREFLUTTER_REPO_TOKEN}@github.com/meshik/pureflutter.git" HEAD >/dev/null 2>&1; then
            echo "::error::PUREFLUTTER_REPO_TOKEN cannot read meshik/pureflutter."
            echo "::error::Use a token owned by an account that can open that repo, and ensure org SSO/token approval is completed if required."
            exit 1
          fi
          git config --global url."https://x-access-token:${PUREFLUTTER_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: flutter pub get
      - name: Run one local bughunt session
        shell: bash
        env:
          RUN_ID: smoke-${{ github.run_id }}-local-${{ matrix.seed }}
          BULLETHOLE_LOG_ROOT: ${{ github.workspace }}
          BULLETHOLE_BUGHUNT_RUN_ID: smoke-${{ github.run_id }}-local-${{ matrix.seed }}
        run: |
          set -euo pipefail
          flutter pub run tool/sheshbesh_ai_duel.dart \
            --games=1 \
            --seed=${{ matrix.seed }} \
            --run-id="$RUN_ID"

      - name: Gate local log
        shell: bash
        env:
          RUN_ID: smoke-${{ github.run_id }}-local-${{ matrix.seed }}
        run: |
          set -euo pipefail
          LOG="artifacts/bughunt/$RUN_ID/backgammon/ai/locala.jsonl"
          test -f "$LOG"
          grep -q '"eventType":"session_complete"' "$LOG"
          ! grep -q '"eventType":"crash"' "$LOG"
          ! grep -q '"eventType":"invariant_failure"' "$LOG"
          ! grep -q 'HOST_CLIENT_DESYNC' "$LOG"

      - name: Summarize local smoke lane
        if: always()
        shell: bash
        env:
          RUN_ID: smoke-${{ github.run_id }}-local-${{ matrix.seed }}
        run: |
          set +e
          LOG="artifacts/bughunt/$RUN_ID/backgammon/ai/locala.jsonl"
          completions=0
          crashes=0
          invariants=0
          if [ -f "$LOG" ]; then
            completions=$(grep -c '"eventType":"session_complete"' "$LOG" || true)
            crashes=$(grep -c '"eventType":"crash"' "$LOG" || true)
            invariants=$(grep -c '"eventType":"invariant_failure"' "$LOG" || true)
          fi
          {
            echo "### backgammon-local-smoke seed=${{ matrix.seed }}"
            echo ""
            echo "- runId: $RUN_ID"
            echo "- completions: $completions"
            echo "- crashes: $crashes"
            echo "- invariantFailures: $invariants"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload local smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backgammon-local-smoke-${{ matrix.seed }}
          path: artifacts/bughunt/smoke-${{ github.run_id }}-local-${{ matrix.seed }}
          if-no-files-found: warn

  backgammon-online-smoke-experimental:
    if: ${{ vars.BUGHUNT_BACKEND_URL != '' }}
    runs-on: self-hosted
    continue-on-error: true
    timeout-minutes: 35
    strategy:
      fail-fast: true
      matrix:
        seed: [2201, 2202, 2203, 2204, 2205]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: false
      - name: Verify shared dependency pin
        run: dart tool/verify_shared_dependency.dart

      - name: Clear checkout GitHub auth header
        shell: bash
        run: |
          git config --local --unset-all http.https://github.com/.extraheader || true
          git config --global --unset-all http.https://github.com/.extraheader || true

      - name: Validate access to shared git dependency
        shell: bash
        env:
          PUREFLUTTER_REPO_TOKEN: ${{ secrets.PUREFLUTTER_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if git ls-remote https://github.com/meshik/pureflutter.git HEAD >/dev/null 2>&1; then
            echo "Anonymous access to meshik/pureflutter is available."
            exit 0
          fi
          if [ -z "${PUREFLUTTER_REPO_TOKEN:-}" ]; then
            echo "::error::Anonymous git access failed and PUREFLUTTER_REPO_TOKEN is missing."
            echo "::error::Add PUREFLUTTER_REPO_TOKEN with read access to meshik/pureflutter."
            exit 1
          fi
          if ! git ls-remote "https://x-access-token:${PUREFLUTTER_REPO_TOKEN}@github.com/meshik/pureflutter.git" HEAD >/dev/null 2>&1; then
            echo "::error::PUREFLUTTER_REPO_TOKEN cannot read meshik/pureflutter."
            echo "::error::Use a token owned by an account that can open that repo, and ensure org SSO/token approval is completed if required."
            exit 1
          fi
          git config --global url."https://x-access-token:${PUREFLUTTER_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: flutter pub get
      - name: Run host/client online bughunt session
        shell: bash
        env:
          BACKEND_URL: ${{ vars.BUGHUNT_BACKEND_URL }}
          RUN_ID: smoke-${{ github.run_id }}-online-${{ matrix.seed }}
          BULLETHOLE_LOG_ROOT: ${{ github.workspace }}
          BULLETHOLE_BUGHUNT_RUN_ID: smoke-${{ github.run_id }}-online-${{ matrix.seed }}
        run: |
          set -euo pipefail
          OUT="artifacts/bughunt/$RUN_ID/backgammon/online"
          mkdir -p "$OUT"
          HOST_LOG="$OUT/host.jsonl"
          CLIENT_LOG="$OUT/client.jsonl"

          flutter pub run tool/network_ai_duel_client.dart \
            --backend-url="$BACKEND_URL" \
            --name="BackgammonHost-${{ matrix.seed }}" \
            --cooldown-seconds=0 \
            --seed=${{ matrix.seed }} \
            --role=host \
            --run-id="$RUN_ID" \
            --log-file="$HOST_LOG" \
            >"$OUT/host.stdout.log" 2>"$OUT/host.stderr.log" &
          HOST_PID=$!

          READY=0
          for _ in $(seq 1 120); do
            if [ -f "$HOST_LOG" ] && grep -q '"eventType":"session_joined"' "$HOST_LOG"; then
              READY=1
              break
            fi
            sleep 0.5
          done
          if [ "$READY" -ne 1 ]; then
            kill "$HOST_PID" || true
            echo "Host did not emit ready event"
            exit 1
          fi

          flutter pub run tool/network_ai_duel_client.dart \
            --backend-url="$BACKEND_URL" \
            --name="BackgammonClient-${{ matrix.seed }}" \
            --cooldown-seconds=0 \
            --seed=${{ matrix.seed }} \
            --role=client \
            --run-id="$RUN_ID" \
            --log-file="$CLIENT_LOG" \
            >"$OUT/client.stdout.log" 2>"$OUT/client.stderr.log" &
          CLIENT_PID=$!

          wait "$HOST_PID"
          wait "$CLIENT_PID"

      - name: Gate online logs
        shell: bash
        env:
          RUN_ID: smoke-${{ github.run_id }}-online-${{ matrix.seed }}
        run: |
          set -euo pipefail
          HOST_LOG="artifacts/bughunt/$RUN_ID/backgammon/online/host.jsonl"
          CLIENT_LOG="artifacts/bughunt/$RUN_ID/backgammon/online/client.jsonl"
          test -f "$HOST_LOG"
          test -f "$CLIENT_LOG"
          grep -q '"eventType":"session_complete"' "$HOST_LOG"
          grep -q '"eventType":"session_complete"' "$CLIENT_LOG"
          ! grep -q '"eventType":"crash"' "$HOST_LOG"
          ! grep -q '"eventType":"crash"' "$CLIENT_LOG"
          ! grep -q '"eventType":"invariant_failure"' "$HOST_LOG"
          ! grep -q '"eventType":"invariant_failure"' "$CLIENT_LOG"
          ! grep -q 'HOST_CLIENT_DESYNC' "$HOST_LOG"
          ! grep -q 'HOST_CLIENT_DESYNC' "$CLIENT_LOG"

      - name: Summarize online smoke lane
        if: always()
        shell: bash
        env:
          RUN_ID: smoke-${{ github.run_id }}-online-${{ matrix.seed }}
        run: |
          set +e
          HOST_LOG="artifacts/bughunt/$RUN_ID/backgammon/online/host.jsonl"
          CLIENT_LOG="artifacts/bughunt/$RUN_ID/backgammon/online/client.jsonl"
          host_completions=0
          client_completions=0
          host_crashes=0
          client_crashes=0
          if [ -f "$HOST_LOG" ]; then
            host_completions=$(grep -c '"eventType":"session_complete"' "$HOST_LOG" || true)
            host_crashes=$(grep -c '"eventType":"crash"' "$HOST_LOG" || true)
          fi
          if [ -f "$CLIENT_LOG" ]; then
            client_completions=$(grep -c '"eventType":"session_complete"' "$CLIENT_LOG" || true)
            client_crashes=$(grep -c '"eventType":"crash"' "$CLIENT_LOG" || true)
          fi
          verdict="BLOCKED"
          if [ "$host_completions" -gt 0 ] && [ "$client_completions" -gt 0 ] && [ "$host_crashes" -eq 0 ] && [ "$client_crashes" -eq 0 ]; then
            verdict="PASS"
          fi
          {
            echo "### backgammon-online-smoke-experimental seed=${{ matrix.seed }}"
            echo ""
            echo "- runId: $RUN_ID"
            echo "- verdict: $verdict"
            echo "- hostCompletions: $host_completions"
            echo "- clientCompletions: $client_completions"
            echo "- hostCrashes: $host_crashes"
            echo "- clientCrashes: $client_crashes"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload online smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backgammon-online-smoke-${{ matrix.seed }}
          path: artifacts/bughunt/smoke-${{ github.run_id }}-online-${{ matrix.seed }}
          if-no-files-found: warn

  backgammon-integration-smoke:
