            echo "::error::Add PUREFLUTTER_REPO_TOKEN with read access to meshik/pureflutter."
            exit 1
          fi
          if ! git ls-remote "https://x-access-token:${PUREFLUTTER_REPO_TOKEN}@github.com/meshik/pureflutter.git" HEAD >/dev/null 2>&1; then
            echo "::error::PUREFLUTTER_REPO_TOKEN cannot read meshik/pureflutter."
            echo "::error::Use a token owned by an account that can open that repo, and ensure org SSO/token approval is completed if required."
            exit 1
          fi
          git config --global url."https://x-access-token:${PUREFLUTTER_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: flutter pub get
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run integration smoke under xvfb
        shell: bash
        run: xvfb-run -a flutter test integration_test/backgammon_bughunt_smoke_test.dart

      - name: Summarize integration smoke
        if: always()
        shell: bash
        run: |
          {
            echo "### backgammon-integration-smoke"
            echo ""
            echo "- verdict: completed"
            echo "- artifactRoot: artifacts/bughunt"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload integration smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backgammon-integration-smoke
          path: artifacts/bughunt
          if-no-files-found: warn

